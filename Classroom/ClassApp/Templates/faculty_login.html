<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>

    <style>
        .top-space { margin-top: 120px; }    /* adjust based on your header height */
        .bottom-space { margin-bottom: 50px; } /* adjust based on footer height */
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "segoe ui", verdana, helvetica, arial, sans-serif;
            font-size: 16px;
            transition: 300ms ease;
        }

        body {
            background: #f2f2f2;
        }

        .row {
            background-color: #033258;
            color: #9dc3e2;
            text-align: center;
            padding: 2em 2em 1em;
            width: 90%;
            margin: 2em auto;
            border-radius: 6px;
        }

        .row h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
        }

        .form-group {
            margin-top: 1em;
        }

        .form-group label {
            display: block;
            text-align: left;
            color: #fff;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .form-group input {
            padding: 0.7em;
            width: 100%;
            border: none;
            border-bottom: 1px solid #666;
            background: transparent;
            color: #eee;
        }

        .form-group input:focus {
            background: #fff;
            color: #000;
            padding: 1em;
        }

        .btn {
            width: 100%;
            margin-top: 2em;
            padding: 1em;
            border: 1px solid #fff;
            border-radius: 5px;
            background: transparent;
            color: #80aed4;
            font-weight: 700;
            cursor: pointer;
        }

        .btn:hover {
            background: #fff;
            color: #033258;
        }

        .footer a {
            color: #9dc3e2;
            text-decoration: none;
            font-size: 0.9em;
        }

        .footer h5 {
            margin-top: 1.2em;
        }

        @media screen and (min-width: 900px) {
            .row { width: 35%; }
        }
    </style>
</head>
<body>
{% include 'header1.html' %}
<div class="top-space"></div>
<div class="row">
    <h1>Welcome Back</h1>
    <p style="color:#ddd; margin-bottom:1em;">Login to your account</p>

    <!-- SHOW ERROR MESSAGE -->
    {% if messages %}
    {% for msg in messages %}
        {% if 'error' in msg.tags %}
            <p style="color: yellow; font-weight: 600; margin-bottom: 10px;">
                {{ msg }}
            </p>
        {% endif %}
    {% endfor %}
    {% endif %}


    <!-- LOGIN FORM START -->
    <form action="{% url 'faculty_login' %}" method="post">
        {% csrf_token %}

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="femail" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="pw" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="btn">Login</button>
    </form>
    <!-- LOGIN FORM END -->
    <div class="card bottom-space"></div>
    <div class="footer">
        <h6><a href="{% url 'faculty_forgot_password' %}">Forgot Password?</a></h6>
        <h6>New user? <a href="{% url 'faculty_registration' %}">Create Account</a></h6>
    </div>

</div>
<!-- Footer include -->
{% include 'footer.html' %}
</body>
</html>
