<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Faculty Registration</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "segoe ui", verdana, helvetica, arial, sans-serif;
            font-size: 16px;
            transition: 300ms ease;
        }

        body {
            background: #f2f2f2;
            padding-top: 90px;
        }

        .row {
            background-color: #033258;
            color: #9dc3e2;
            text-align: center;
            padding: 2em 2em 1em;
            width: 90%;
            margin: 2em auto;
            border-radius: 6px;
        }

        .row h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
        }

        .form-group {
            margin-top: 1em;
            text-align: left;
        }

        .form-group label {
            display: block;
            color: #fff;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .form-group input {
            padding: 0.7em;
            width: 100%;
            border: none;
            border-bottom: 1px solid #666;
            background: transparent;
            color: #eee;
        }

        .form-group input:focus {
            background: #fff;
            color: #000;
            padding: 1em;
        }

        .btn {
            width: 100%;
            margin-top: 2em;
            padding: 1em;
            border: 1px solid #fff;
            border-radius: 5px;
            background: transparent;
            color: #80aed4;
            font-weight: 700;
            cursor: pointer;
        }

        .btn:hover {
            background: #fff;
            color: #033258;
        }

        .footer a {
            color: #9dc3e2;
            text-decoration: none;
            font-size: 0.9em;
        }

        .footer h5 {
            margin-top: 1.2em;
        }

        @media screen and (min-width: 900px) {
            .row {
                width: 35%;
            }
        }
    </style>
</head>

<body>

    <div class="row">
        <h1>Faculty Registration</h1>
        <p style="color:#ddd; margin-bottom:1em;">Register your details</p>

        <form action="{% url 'faculty_registration' %}" method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="fname" placeholder="Enter full name" required>
            </div>

            <div class="form-group">
                <label>Mobile Number</label>
                <input type="text" name="fphone" placeholder="Enter mobile number" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="femail" placeholder="Enter email" required>
            </div>

            <div class="form-group">
                <label>Username</label>
                <input type="text" name="unm" placeholder="Enter username" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="pw" placeholder="Create a password" required>
            </div>

            <button type="submit" class="btn">Register</button>
        </form>

        <div class="footer">
            <h5>Already have an account? <a href="{% url 'faculty_login' %}">Login</a></h5>
        </div>

    </div>

</body>
</html>
