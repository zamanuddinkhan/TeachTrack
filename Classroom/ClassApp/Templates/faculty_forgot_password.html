{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    {% include 'header1.html' %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forgot Password</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "segoe ui", verdana, helvetica, arial, sans-serif;
            font-size: 16px;
            transition: 300ms ease;
        }

        body {
            background: #f2f2f2;
            padding-top: 90px;
        }

        .row {
            background-color: #033258;
            color: #9dc3e2;
            text-align: center;
            padding: 2em 2em 1em;
            width: 90%;
            margin: 2em auto;
            border-radius: 6px;
        }

        .row h1 {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .info {
            color: #ddd;
            font-size: 0.9em;
            margin-bottom: 1.5em;
        }

        .form-group label {
            display: block;
            text-align: left;
            color: #fff;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .form-group input {
            padding: 0.7em;
            width: 100%;
            border: none;
            border-bottom: 1px solid #666;
            background: transparent;
            color: #eee;
        }

        .form-group input:focus {
            background: #fff;
            color: #000;
            padding: 1em;
        }

        .btn {
            width: 100%;
            margin-top: 2em;
            padding: 1em;
            border: 1px solid #fff;
            border-radius: 5px;
            background: transparent;
            color: #80aed4;
            font-weight: 700;
            cursor: pointer;
        }

        .btn:hover {
            background: #fff;
            color: #033258;
        }

        .footer h5 a {
            color: #9dc3e2;
            text-decoration: none;
            font-size: 0.9em;
        }

        .footer h5 {
            margin-top: 1.2em;
        }

        @media screen and (min-width: 900px) {
            .row { width: 40%; }
        }
    </style>
</head>

<body><br><br>

    <div class="row">
        <h1>Forgot Password?</h1>
        <p class="info">Enter your email and we’ll send a reset link.</p>

        <form method="POST">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="femail" placeholder="Enter your registered email" required>
            </div>

            <button type="submit" class="btn">Send Reset Link</button>
        </form>

        <div class="footer">
            <h5><a href="{% url 'faculty_login' %}">Back to Login</a></h5>
        </div>
    </div><br><br><br><br><br>
{% include 'footer.html' %}
</body>
</html>
